<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقع حمود الخاص</title>

<style>
body{
margin:0;
font-family:Tahoma;
color:white;
text-align:center;
background:linear-gradient(#020111,#000000);
}

/* النجوم */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:move 120s linear infinite;
z-index:-1;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

.container{
margin-top:60px;
}

.sound{
background:rgba(255,255,255,0.08);
padding:15px;
margin:10px auto;
width:260px;
border-radius:10px;
}

button{
background:#3a6df0;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#5a85ff;
}

audio{
width:100%;
margin-top:5px;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
<h1>موقع حمود الخاص</h1>

<div id="sounds"></div>

</div>

<script src="sounds.js"></script>

<script>

const container = document.getElementById("sounds");

sounds.forEach((link,i)=>{

const div=document.createElement("div");
div.className="sound";

div.innerHTML=`
<p>الصوت ${i+1}</p>
<audio controls src="${link}"></audio>
`;

container.appendChild(div);

});

</script>

</body>
</html>
