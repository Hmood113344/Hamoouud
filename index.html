<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبتي الصوتية</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .audio-item { background: #222; padding: 15px; margin: 8px; border-radius: 8px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 5px; border: none; margin: 2px; }
        .play { background: #1DB954; color: white; }
        .stop { background: #E91E63; color: white; }
    </style>
</head>
<body>

    <h1>قائمة الأصوات</h1>
    <div id="playlist-container"></div>

    <script>
        // هنا فقط ضيف أسماء ملفاتك (تأكد أن الملفات في مجلد audio)
        const myAudios = [
            { name: "صوت الطبيعة", file: "sound1.mp3" },
            { name: "صوت عاصفة", file: "sound2.mp3" },
            { name: "صوت طيور", file: "sound3.mp3" },
            { name: "صوت مطر", file: "sound4.mp3" }
            // تقدر تضيف أي عدد تبيه هنا بنفس الطريقة
        ];

        const container = document.getElementById('playlist-container');
        let currentAudio = null;

        myAudios.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'audio-item';
            div.innerHTML = `
                <span>${item.name}</span>
                <div>
                    <button class="play" onclick="play('${item.file}')">▶</button>
                    <button class="stop" onclick="stop()">■</button>
                </div>
            `;
            container.appendChild(div);
        });

        const player = new Audio();
        function play(file) {
            player.src = "audio/" + file;
            player.play();
        }
        function stop() { player.pause(); player.currentTime = 0; }
    </script>
</body>
</html>
